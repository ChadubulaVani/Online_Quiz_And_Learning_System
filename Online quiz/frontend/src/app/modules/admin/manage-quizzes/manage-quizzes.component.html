<div class="page">
  <h1>Manage Quizzes</h1>

  <!-- Add Quiz -->
  <div class="form">
    <input type="text" placeholder="Quiz Title" [(ngModel)]="title" />
    <input type="text" placeholder="Course Name" [(ngModel)]="course" />
    <button (click)="addQuiz()">Add Quiz</button>
  </div>

  <!-- Quiz List -->
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Course</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let quiz of quizzes; let i = index">
        <td>{{ quiz.title }}</td>
        <td>{{ quiz.course }}</td>
        <td>
          <button (click)="deleteQuiz(i)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
