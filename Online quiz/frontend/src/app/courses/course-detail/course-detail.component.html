<div class="course-detail-container" *ngIf="course">

  <div class="course-header">
    <h1>{{ course.title }}</h1>
    <p>{{ course.description }}</p>
  </div>

  <section class="section-card">
    <h2>Course Content</h2>
    <ul>
      <li *ngFor="let topic of course.contents">{{ topic }}</li>
    </ul>
  </section>

  <section class="section-card" *ngIf="course.videos?.length">
    <h2>Video Lectures</h2>
    <div *ngFor="let video of course.videos" class="video-card">
      <h3>{{ video.title }}</h3>
      <iframe
        class="video-frame"
        width="70%"
        height="400"
        [src]="video.url | safeUrl"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <section class="section-card" *ngIf="quiz?.questions?.length">
    <h2>Quiz</h2>

    <label>Difficulty Level:</label>
    <select [(ngModel)]="selectedLevel" (change)="onLevelChange()">
      <option>Easy</option>
      <option>Medium</option>
      <option>Hard</option>
    </select>

    <p *ngIf="!result">⏲ Time Left: {{ timer }} seconds</p>

    <div *ngFor="let question of quiz.questions; let i = index" class="quiz-question">
      <p><strong>{{ question.questionText }}</strong></p>
      <ul>
        <li *ngFor="let option of question.options; let j = index">
          <label>
            <input
              type="radio"
              [name]="'question-' + i"
              [checked]="selectedAnswers[i] === j"
              (change)="selectAnswer(i, j)"
              [disabled]="result"
            >
            {{ option }}

            <span *ngIf="result">
              <span *ngIf="j === question.correctAnswer">✅</span>
              <span *ngIf="j !== question.correctAnswer && selectedAnswers[i] === j">❌</span>
            </span>
          </label>
        </li>
      </ul>
    </div>

    <button class="quiz-submit-btn" (click)="submitQuiz()" [disabled]="result">Submit Quiz</button>
  </section>

  <section class="section-card" *ngIf="result">
    <div class="result-card">
      <h2>Quiz Completed!🎉</h2>
      <p class="score-text">
        <strong>Your Score:</strong> {{ result.score }} / {{ result.total }}
      </p>
    </div>
  </section>

</div>
